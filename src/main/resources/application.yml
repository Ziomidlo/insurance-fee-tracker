spring:
  application:
    name: insurance-app

  datasource:
    url: jdbc:postgresql://localhost:5433/insurance_db
    username: admin
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true